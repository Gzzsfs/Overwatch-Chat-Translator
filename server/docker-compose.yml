services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: overwatch_translator
      POSTGRES_USER: overwatch
      POSTGRES_PASSWORD: overwatch_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  proxy:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://overwatch:overwatch_dev_password@postgres:5432/overwatch_translator
      REDIS_URL: redis://redis:6379
      ALLOW_PUBLIC_REGISTRATION: "false"
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-v4-flash
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    ports:
      - "8080:8080"
    command: sh -c "node dist/migrate.js && node dist/index.js"

volumes:
  postgres-data:
